<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sgrep — semantic code search</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --fg: #e6edf3; --muted: #8b949e; --accent: #2f81f7; --accent-fg: #fff;
    --code-bg: #0b0f14;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 64px; }
  h1 { margin: 0 0 4px; font-size: 26px; }
  h1 .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; color: var(--accent); }
  .tagline { color: var(--muted); margin: 0 0 24px; }
  .controls {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: stretch;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-bottom: 8px;
  }
  select, input, button {
    font: inherit; color: var(--fg); background: var(--code-bg);
    border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px;
  }
  #query { flex: 1 1 320px; }
  select { flex: 0 0 auto; }
  button {
    background: var(--accent); color: var(--accent-fg); border-color: var(--accent);
    cursor: pointer; font-weight: 600; padding: 10px 18px;
  }
  button:disabled { opacity: .55; cursor: default; }
  .repo-desc { color: var(--muted); font-size: 13px; margin: 2px 4px 22px; min-height: 18px; }
  .status { color: var(--muted); padding: 12px 4px; }
  .status.error { color: #f85149; }
  .hit {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 14px;
  }
  .hit-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
  .path { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px; color: var(--accent); word-break: break-all; }
  .ctx { color: var(--muted); font-size: 12px; }
  .score {
    margin-left: auto; font-size: 12px; color: var(--muted);
    font-family: ui-monospace, monospace; white-space: nowrap;
  }
  pre {
    margin: 0; background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 7px; padding: 12px; overflow-x: auto;
    font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; line-height: 1.45;
  }
  footer { color: var(--muted); font-size: 12px; margin-top: 32px; text-align: center; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="mono">sgrep</span> — the improved grep code search</h1>
  <p class="tagline">Search real codebases by vibes, not keywords. pick a repo and ask in plain english.</p>

  <form class="controls" id="form" autocomplete="off">
    <select id="repo" aria-label="Repository"></select>
    <input id="query" maxlength="500" placeholder="e.g. retry a request with backoff" aria-label="Query">
    <button id="go" type="submit">Search</button>
  </form>
  <div class="repo-desc" id="repoDesc"></div>

  <div class="status" id="status">Loading repositories…</div>
  <div id="results"></div>

  <footer>Runs 100% locally on a homelab k3s cluster · model: all-MiniLM-L6-v2</footer>
</div>

<script>
const $ = (id) => document.getElementById(id);
let repos = [];

function setStatus(msg, isError) {
  const el = $("status");
  el.textContent = msg || "";
  el.className = "status" + (isError ? " error" : "");
  el.style.display = msg ? "block" : "none";
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function renderRepoDesc() {
  const r = repos.find(r => r.id === $("repo").value);
  $("repoDesc").textContent = r ? `${r.description}  ·  ${r.chunk_count} indexed functions` : "";
}

function renderResults(data) {
  const box = $("results");
  box.innerHTML = "";
  if (!data.results.length) { setStatus("No matches found.", false); return; }
  setStatus("", false);
  for (const h of data.results) {
    const line = h.line_end ? `${h.line_start}-${h.line_end}` : h.line_start;
    const div = document.createElement("div");
    div.className = "hit";
    div.innerHTML =
      `<div class="hit-head">` +
        `<span class="path">${escapeHtml(h.display_path)}:${line}</span>` +
        `<span class="ctx">${escapeHtml(h.context || "")}</span>` +
        `<span class="score">${h.score.toFixed(3)}</span>` +
      `</div>` +
      `<pre>${escapeHtml(h.code || "")}</pre>`;
    box.appendChild(div);
  }
}

async function loadRepos() {
  try {
    const res = await fetch("/api/repos");
    if (!res.ok) throw new Error("failed to load repos");
    repos = await res.json();
    const sel = $("repo");
    sel.innerHTML = repos.map(r => `<option value="${escapeHtml(r.id)}">${escapeHtml(r.name)}</option>`).join("");
    renderRepoDesc();
    setStatus(repos.length ? "Enter a query to search." : "No repositories available.", false);
  } catch (e) {
    setStatus("Service is still warming up (loading the model). Retrying…", true);
    setTimeout(loadRepos, 3000);
  }
}

async function doSearch(ev) {
  ev.preventDefault();
  const query = $("query").value.trim();
  if (!query) return;
  $("go").disabled = true;
  setStatus("Searching…", false);
  $("results").innerHTML = "";
  try {
    const res = await fetch("/api/search", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ repo: $("repo").value, query, top_k: 5 }),
    });
    if (res.status === 503) throw new Error("Service is warming up, try again shortly.");
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `search failed (${res.status})`);
    }
    renderResults(await res.json());
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    $("go").disabled = false;
  }
}

$("form").addEventListener("submit", doSearch);
$("repo").addEventListener("change", renderRepoDesc);
loadRepos();
</script>
</body>
</html>
